# K3s flavor manifest, embedded into the bootstrap-capi binary.
#
# Replaces a `clusterctl generate cluster --flavor k3s` call against
# CAPMOX (which doesn't ship a K3s flavor upstream). The renderer in
# internal/capimanifest/k3s.go fills the template with `os.Expand`
# against cfg; the four post-generate patches in patches.go then run
# unchanged (PatchKubeadmSkipKubeProxyForCilium is a safe no-op against
# this template — K3s disables kube-proxy via serverConfig.disableComponents).
#
# `clusterctl init --control-plane k3s --bootstrap k3s` installs the
# matching K3s providers (KCP-K3s + CABK3s); see internal/bootstrap.
#
# Variables (filled by k3s.go from cfg):
#   CLUSTER_NAME / NAMESPACE
#   KUBERNETES_VERSION              (K3s manifests append "+k3s1")
#   CONTROL_PLANE_MACHINE_COUNT     WORKER_MACHINE_COUNT
#   PROXMOX_URL / PROXMOX_REGION / PROXMOX_NODE / PROXMOX_TEMPLATE_ID
#   PROXMOX_SOURCENODE / BRIDGE / PROXMOX_CLOUDINIT_STORAGE
#   CONTROL_PLANE_ENDPOINT_IP / CONTROL_PLANE_ENDPOINT_PORT
#   NODE_IP_RANGES / GATEWAY / IP_PREFIX / DNS_SERVERS / ALLOWED_NODES
#   VM_SSH_KEYS / PROXMOX_MEMORY_ADJUSTMENT
#   CONTROL_PLANE_BOOT_VOLUME_DEVICE / SIZE / NUM_SOCKETS / NUM_CORES / MEMORY_MIB
#   WORKER_BOOT_VOLUME_DEVICE / SIZE / NUM_SOCKETS / NUM_CORES / MEMORY_MIB

apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: ${NAMESPACE}
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["192.168.0.0/16"]
    services:
      cidrBlocks: ["10.96.0.0/12"]
  controlPlaneEndpoint:
    host: ${CONTROL_PLANE_ENDPOINT_IP}
    port: ${CONTROL_PLANE_ENDPOINT_PORT}
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta2
    kind: KThreesControlPlane
    name: ${CLUSTER_NAME}-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: ProxmoxCluster
    name: ${CLUSTER_NAME}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ProxmoxCluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: ${NAMESPACE}
spec:
  controlPlaneEndpoint:
    host: ${CONTROL_PLANE_ENDPOINT_IP}
    port: ${CONTROL_PLANE_ENDPOINT_PORT}
  ipv4Config:
    addresses: ${NODE_IP_RANGES}
    gateway: ${GATEWAY}
    prefix: ${IP_PREFIX}
  dnsServers: ${DNS_SERVERS}
  allowedNodes: ${ALLOWED_NODES}
  schedulerHints:
    memoryAdjustment: ${PROXMOX_MEMORY_ADJUSTMENT}
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KThreesControlPlane
metadata:
  name: ${CLUSTER_NAME}-control-plane
  namespace: ${NAMESPACE}
spec:
  replicas: ${CONTROL_PLANE_MACHINE_COUNT}
  version: ${KUBERNETES_VERSION}+k3s1
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
      kind: ProxmoxMachineTemplate
      name: ${CLUSTER_NAME}-control-plane
  kthreesConfigSpec:
    serverConfig:
      # K3s replaces kube-proxy with its own implementation by default.
      # bootstrap-capi installs Cilium with kubeProxyReplacement=true on
      # top, so disable the K3s built-ins that Cilium subsumes.
      disableComponents:
        - servicelb       # we use Cilium LB-IPAM instead
        - traefik         # workload uses an Argo CD-installed ingress
      tlsSan:
        - ${CONTROL_PLANE_ENDPOINT_IP}
    agentConfig:
      airGapped: false
      kubeletArgs:
        - "--cloud-provider=external"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ProxmoxMachineTemplate
metadata:
  name: ${CLUSTER_NAME}-control-plane
  namespace: ${NAMESPACE}
spec:
  template:
    spec:
      sourceNode: ${PROXMOX_SOURCENODE}
      templateID: ${PROXMOX_TEMPLATE_ID}
      pool: ${PROXMOX_POOL}
      vmIDRange:
        start: 1000
        end: 1099
      format: qcow2
      full: true
      disks:
        bootVolume:
          disk: ${CONTROL_PLANE_BOOT_VOLUME_DEVICE}
          sizeGb: ${CONTROL_PLANE_BOOT_VOLUME_SIZE}
      network:
        default:
          bridge: ${BRIDGE}
          model: virtio
      numSockets: ${CONTROL_PLANE_NUM_SOCKETS}
      numCores: ${CONTROL_PLANE_NUM_CORES}
      memoryMiB: ${CONTROL_PLANE_MEMORY_MIB}
      sshAuthorizedKeys: ${VM_SSH_KEYS}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: ${CLUSTER_NAME}-md-0
  namespace: ${NAMESPACE}
spec:
  clusterName: ${CLUSTER_NAME}
  replicas: ${WORKER_MACHINE_COUNT}
  selector:
    matchLabels: {}
  template:
    spec:
      clusterName: ${CLUSTER_NAME}
      version: ${KUBERNETES_VERSION}+k3s1
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
          kind: KThreesConfigTemplate
          name: ${CLUSTER_NAME}-md-0
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: ProxmoxMachineTemplate
        name: ${CLUSTER_NAME}-md-0
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KThreesConfigTemplate
metadata:
  name: ${CLUSTER_NAME}-md-0
  namespace: ${NAMESPACE}
spec:
  template:
    spec:
      agentConfig:
        airGapped: false
        kubeletArgs:
          - "--cloud-provider=external"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ProxmoxMachineTemplate
metadata:
  name: ${CLUSTER_NAME}-md-0
  namespace: ${NAMESPACE}
spec:
  template:
    spec:
      sourceNode: ${PROXMOX_SOURCENODE}
      templateID: ${PROXMOX_TEMPLATE_ID}
      pool: ${PROXMOX_POOL}
      vmIDRange:
        start: 2000
        end: 2099
      format: qcow2
      full: true
      disks:
        bootVolume:
          disk: ${WORKER_BOOT_VOLUME_DEVICE}
          sizeGb: ${WORKER_BOOT_VOLUME_SIZE}
      network:
        default:
          bridge: ${BRIDGE}
          model: virtio
      numSockets: ${WORKER_NUM_SOCKETS}
      numCores: ${WORKER_NUM_CORES}
      memoryMiB: ${WORKER_MEMORY_MIB}
      sshAuthorizedKeys: ${VM_SSH_KEYS}
