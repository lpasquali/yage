# SPDX-License-Identifier: Apache-2.0
# Thin orchestration layer — calls shared workflows from rune-ci.
name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  # ─── Shared: Security scanning (gitleaks + SBOM) ────────────────────────────
  security:
    uses: lpasquali/rune-ci/.github/workflows/security-scan.yml@36eba801cb73e7b613ef1ee33bb3f618928a5952
    secrets: inherit

  # ─── Shared: Go quality (coverage + lint + SAST + license) ─────────────────
  go-quality:
    uses: lpasquali/rune-ci/.github/workflows/go-quality.yml@36eba801cb73e7b613ef1ee33bb3f618928a5952
    with:
      go-version: "1.26"
      coverage-threshold: "60"

  # ─── Compliance/Merge Gate ──────────────────────────────────────────────────
  compliance:
    needs: [security, go-quality]
    if: always()
    uses: lpasquali/rune-ci/.github/workflows/pr-compliance.yml@36eba801cb73e7b613ef1ee33bb3f618928a5952
    with:
      needs-json: ${{ toJson(needs) }}
